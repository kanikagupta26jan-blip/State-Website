<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroMart - Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/Form_signin.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/main_logo.png">
</head>
<body>
  <div class="form-container">
    <h1>AgroTech Registration</h1>
    <form action="http://localhost:600/register" method="POST" id="registration-form"> 
    <div class="messageDiv" id="signUpMessage" style="display: none;"></div>
      <div class="form-group">
        <label for="role">Select Role</label>
        <select id="role" name="role" required>
          <option value="farmer-sell">Farmer (Sell Products)</option>
          <option value="farmer-rent">Farmer (Rent Equipments)</option>
          <option value="farmer-rent-sell">Farmer (Sell Equipments)</option>
          <option value="expert">Want Advice</option>
          <option value="customer">Customer (Buy Veggies)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required pattern="^[a-zA-Z\s]+$" title="Name should only contain letters and spaces.">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter a secure password" required minlength="8" title="Password should be at least 8 characters long.">
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required minlength="8">
      </div>

      <button type="submit" id="submit" class="btn">Register</button>
    </form>
  </div>

<script src="../scripts/form_signin.js"></script>

</body>
</html>
